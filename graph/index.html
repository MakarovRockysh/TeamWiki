<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>关系图谱 · TeamWiki</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles/base.css" />
<link rel="stylesheet" href="/styles/wiki.css" />
<style>
  .graph {
    position: relative;
    height: 480px;
    border-radius: var(--radius);
    background: rgba(20,22,30,0.45);
    border: 1px solid var(--line);
    overflow: hidden;
  }
  .node {
    position: absolute;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(20,22,30,0.85);
    border: 1px solid var(--line-2);
    font-size: 12px;
    color: var(--ink);
    white-space: nowrap;
    transform: translate(-50%, -50%);
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
  }
  .node:hover { transform: translate(-50%, -50%) scale(1.08); border-color: var(--blue-2); }
  .node.center {
    font-weight: 700;
    background: linear-gradient(135deg, var(--blue), #6e3cff);
    border-color: transparent;
    box-shadow: 0 12px 40px rgba(10,132,255,0.4);
  }
  .edge {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(41,151,255,0.4), rgba(255,255,255,0.05));
    transform-origin: 0 0;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="app">
  <main class="main">
    <div class="breadcrumb">
      <a href="/">HOME</a><span class="sep">/</span><span>META</span><span class="sep">/</span><span>GRAPH</span>
    </div>
    <div class="page-head">
      <div style="flex:1;min-width:0;">
        <span class="eyebrow">META · RELATIONS</span>
        <h1>关系图谱</h1>
        <p class="ph-sub">「某个功能」对应哪些会议、PRD、原型、代码、测试 — 全链路上下文一图可见。下面是 demo 形态，正式版用 cytoscape 渲染。</p>
      </div>
    </div>

    <div class="graph" id="g">
      <!-- 节点会以伪坐标渲染，用作 demo 视觉 -->
    </div>

    <section class="section">
      <div class="section-head"><h2>实体类型 · 关系来源</h2></div>
      <div class="cards cards-3">
        <div class="card"><h3 class="card-title">实体</h3><p class="card-desc">Feature · Meeting · PRD · Prototype · Code · Test · Issue</p></div>
        <div class="card"><h3 class="card-title">关系来源 ①</h3><p class="card-desc">markdown frontmatter 里写 <code>related: [...]</code>，人工补充</p></div>
        <div class="card"><h3 class="card-title">关系来源 ②</h3><p class="card-desc">知识库 Agent 定时扫描 + 实体抽取，自动建立关联</p></div>
      </div>
    </section>
  </main>
</div>
<script src="/scripts/data.js"></script>
<script src="/scripts/layout.js"></script>
<script>
  // demo 用静态坐标
  const center = { x: 50, y: 50, label: '功能：项目基础包构建器', cls: 'center' };
  const nodes = [
    { x: 18, y: 22, label: '会议·立项 03.15' },
    { x: 80, y: 18, label: 'PRD v1' },
    { x: 88, y: 50, label: '原型 v2' },
    { x: 80, y: 80, label: '代码 PR #12' },
    { x: 22, y: 78, label: '测试用例 8 条' },
    { x: 12, y: 50, label: '运营异常 0 起' },
  ];
  const g = document.getElementById('g');
  // 中心节点
  g.insertAdjacentHTML('beforeend', `<div class="node center" style="left:${center.x}%;top:${center.y}%;">${center.label}</div>`);
  nodes.forEach(n => {
    g.insertAdjacentHTML('beforeend', `<div class="node" style="left:${n.x}%;top:${n.y}%;">${n.label}</div>`);
  });
  // 画线（中心到每个节点）
  function addEdge(a, b) {
    const w = g.clientWidth, h = g.clientHeight;
    const ax = a.x/100*w, ay = a.y/100*h, bx = b.x/100*w, by = b.y/100*h;
    const dx = bx-ax, dy = by-ay;
    const len = Math.sqrt(dx*dx+dy*dy);
    const ang = Math.atan2(dy, dx)*180/Math.PI;
    g.insertAdjacentHTML('afterbegin', `<div class="edge" style="left:${ax}px;top:${ay}px;width:${len}px;transform:rotate(${ang}deg);"></div>`);
  }
  setTimeout(() => nodes.forEach(n => addEdge(center, n)), 0);
  window.addEventListener('resize', () => {
    g.querySelectorAll('.edge').forEach(e => e.remove());
    nodes.forEach(n => addEdge(center, n));
  });
</script>
</body>
</html>
