<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>代码片段 · TeamWiki</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles/base.css" />
<link rel="stylesheet" href="/styles/wiki.css" />
</head>
<body>
<div class="app">
  <main class="main">
    <div class="breadcrumb">
      <a href="/">HOME</a><span class="sep">/</span><span>ASSETS</span><span class="sep">/</span><span>SNIPPETS</span>
    </div>
    <div class="page-head">
      <div style="flex:1;min-width:0;">
        <span class="eyebrow">ASSETS · SNIPPETS</span>
        <h1>代码片段</h1>
        <p class="ph-sub">小到一段正则、一个 hook，大到一段 boilerplate。所有片段按语言分类，可一键复制到剪贴板。</p>
      </div>
      <div class="ph-meta"><span class="chip">8 段</span></div>
    </div>

    <div class="toolbar">
      <div class="filter-chips">
        <button class="filter-chip active" data-tag="all">全部</button>
        <button class="filter-chip" data-tag="css">CSS</button>
        <button class="filter-chip" data-tag="ts">TS</button>
        <button class="filter-chip" data-tag="js">JS</button>
        <button class="filter-chip" data-tag="sh">Shell</button>
        <button class="filter-chip" data-tag="py">Python</button>
        <button class="filter-chip" data-tag="sql">SQL</button>
      </div>
    </div>

    <div class="cards cards-3" id="grid"></div>
  </main>
</div>
<script src="/scripts/data.js"></script>
<script src="/scripts/layout.js"></script>
<script>
  const W = window.WIKI;
  const grid = document.getElementById('grid');
  function render(filter='all') {
    const items = filter==='all' ? W.snippets : W.snippets.filter(s => s.lang === filter);
    grid.innerHTML = items.map((s,i) => `
      <div class="card">
        <div class="card-head">
          <div class="mono" style="--accent:var(--c-snippet);">${s.lang.toUpperCase()}</div>
          <div style="min-width:0;">
            <h3 class="card-title">${s.name}</h3>
            <div class="card-tag">${s.lang}</div>
          </div>
          <div class="card-num">${String(i+1).padStart(2,'0')}</div>
        </div>
        <div class="card-desc">${s.desc}</div>
        <div class="card-foot">
          <span class="meta">${s.lang}</span>
          <button class="copy-btn" data-name="${s.name}">复制</button>
        </div>
      </div>
    `).join('');
  }
  render();
  document.querySelectorAll('.filter-chip').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      render(b.dataset.tag);
    });
  });
  grid.addEventListener('click', (e) => {
    if (e.target.classList.contains('copy-btn')) {
      navigator.clipboard?.writeText(`// snippet: ${e.target.dataset.name}\n[代码内容占位]`);
      window.toast?.(`已复制：${e.target.dataset.name}`);
    }
  });
</script>
</body>
</html>
