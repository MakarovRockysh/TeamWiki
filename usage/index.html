<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>使用说明 · TeamWiki</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles/base.css" />
<link rel="stylesheet" href="/styles/wiki.css" />
</head>
<body>
<div class="app">
  <main class="main">
    <div class="breadcrumb">
      <a href="/">HOME</a><span class="sep">/</span><span>PRACTICE</span><span class="sep">/</span><span>USAGE</span>
    </div>
    <div class="page-head">
      <div style="flex:1;min-width:0;">
        <span class="eyebrow">PRACTICE · USAGE</span>
        <h1>使用说明</h1>
        <p class="ph-sub">常用工具 / 工作流的操作手册。每条都标注预计阅读时间。</p>
      </div>
      <div class="ph-meta"><span class="chip">8 篇</span></div>
    </div>

    <div class="cards cards-3" id="grid"></div>
  </main>
</div>
<script src="/scripts/data.js"></script>
<script src="/scripts/layout.js"></script>
<script>
  const W = window.WIKI;
  document.getElementById('grid').innerHTML = W.usage.map((u,i) => `
    <a class="card" href="javascript:void(0)" onclick="window.toast('打开使用说明：${u.name}')">
      <div class="card-head">
        <div class="mono" style="--accent:var(--c-usage);">U${String(i+1).padStart(2,'0')}</div>
        <div style="min-width:0;">
          <h3 class="card-title">${u.name}</h3>
          <div class="card-tag">阅读 ${u.time}</div>
        </div>
      </div>
      <div class="card-desc">${u.desc}</div>
      <div class="card-foot">
        <span class="meta">操作手册</span>
        <span class="actions">→</span>
      </div>
    </a>
  `).join('');
</script>
</body>
</html>
